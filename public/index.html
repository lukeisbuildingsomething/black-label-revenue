<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Label Revenue — Coming Soon</title>
  <meta name="description" content="Black Label Revenue — Luke Reimer. Something exceptional is on the way." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --obsidian: #0a0a0b;
      --obsidian-2: #121214;
      --gold: #c9a227;
      --gold-soft: #d9c37e;
      --text: #eae7df;
      --muted: #8b8880;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Georgia", "Times New Roman", serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1a1a1d 0%, var(--obsidian) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 640px; }
    .eyebrow {
      font-family: "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--gold);
      margin-bottom: 2.2rem;
    }
    h1 {
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 0.01em;
      margin-bottom: 1.4rem;
    }
    h1 .gold {
      background: linear-gradient(180deg, var(--gold-soft), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .rule {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.8rem auto;
    }
    p.lead {
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      color: var(--muted);
      line-height: 1.7;
      font-style: italic;
    }
    .tag {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-style: normal;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 3rem;
    }
    .tag strong { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Coming Soon</div>
    <h1>Black Label <span class="gold">Revenue</span></h1>
    <div class="rule"></div>
    <p class="lead">Something exceptional is on the way.</p>
    <div class="tag"><strong>Luke Reimer</strong> &nbsp;·&nbsp; Consulting</div>
  </main>
</body>
</html>
